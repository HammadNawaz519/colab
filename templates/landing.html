<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopy</title>
  <link rel="icon" type="image/png" href="/static/Images/chit_chat.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.86/build/spline-viewer.js"></script>
  <style>
    :root {
      --ink: #1a1c23;
      --ink-soft: #4d5a72;
      --sand: #dfd4b8;
      --ivory: #f7f2e3;
      --mist: #eef2f7;
      --paper: #ffffff;
      --hero-bg:
        radial-gradient(760px 340px at 10% -14%, rgba(52, 77, 120, 0.16), rgba(52, 77, 120, 0) 68%),
        radial-gradient(780px 420px at 90% 108%, rgba(223, 206, 164, 0.46), rgba(223, 206, 164, 0) 68%),
        linear-gradient(130deg, var(--ivory) 0%, #ffffff 46%, #f1ead5 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      background: var(--hero-bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .top-ribbon {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 8px 12px 0;
      background: transparent;
    }

    .hero-nav {
      width: min(1180px, 100%);
      margin: 0 auto;
      min-height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(216, 226, 242, 0.72);
      background: rgba(255, 255, 255, 0.96); /* fully white, mostly opaque */
      backdrop-filter: blur(24px); /* more blur */
      box-shadow: 0 12px 28px rgba(26, 28, 35, 0.12);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 14px;
    }

    .hero-brand {
      text-decoration: none;
      color: var(--ink);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .hero-links {
      flex: 1;
      display: flex;
      justify-content: center;
      gap: 28px;
      align-items: center;
    }

    .hero-links a {
      text-decoration: none;
      color: #566176;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .hero-links a:hover {
      color: var(--ink);
    }

    .hero-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-signup,
    .hero-signin {
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 8px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .hero-signup {
      color: #4a556d;
      border: 1px solid rgba(26, 28, 35, 0.16);
      background: rgba(255, 255, 255, 0.76);
    }

    .hero-signup:hover {
      transform: translateY(-1px);
      border-color: rgba(26, 28, 35, 0.28);
    }

    .hero-signin {
      color: #ffffff;
      background: #1a1c23;
      border: 1px solid #1a1c23;
      box-shadow: 0 10px 18px rgba(26, 28, 35, 0.24);
    }

    .hero-signin:hover {
      transform: translateY(-1px);
    }

    .landing-flow {
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .hero-stage {
      min-height: 100vh;
      width: 100%;
      display: block;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .headphone-scene {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .headphone-shell {
      width: 100%;
      height: 100%;
      will-change: transform;
      transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      transition: filter 0.24s ease;
      position: relative;
      z-index: 2;
      animation: settleIn 1.1s cubic-bezier(0.17, 0.82, 0.22, 1) both;
    }

    .headphone-shell spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 0;
      overflow: hidden;
      filter: none;
      background: transparent;
    }

    .moving-text {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 235, 219, 0.9) 100%);
      border-top: 1px solid rgba(197, 204, 218, 0.74);
      border-bottom: 1px solid rgba(197, 204, 218, 0.74);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 10px 24px rgba(26, 28, 35, 0.08);
      margin-top: clamp(6px, 1.4vw, 12px);
    }

    .moving-track {
      display: flex;
      width: max-content;
      animation: scrollWords 20s linear infinite;
    }

    .moving-con {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 20px 14px 0;
    }

    .moving-con h2 {
      font-size: clamp(34px, 7vw, 88px);
      line-height: 1;
      white-space: nowrap;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: rgba(26, 28, 35, 0.96);
    }

    .gola {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--sand);
      border: 1px solid rgba(26, 28, 35, 0.2);
      box-shadow: 0 2px 5px rgba(26, 28, 35, 0.14);
      flex-shrink: 0;
    }

    @keyframes settleIn {
      0% {
        opacity: 0;
        transform: translateY(84px) scale(0.9) rotate(-6deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    @keyframes scrollWords {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-33.33%);
      }
    }

    @media (max-width: 920px) {
      .hero-links {
        display: none;
      }

      .hero-stage {
        min-height: 100vh;
      }

      .headphone-scene {
        height: 100vh;
      }

      .headphone-shell {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .top-ribbon {
        padding: 7px 8px 0;
      }

      .hero-nav {
        min-height: 46px;
        padding: 7px 9px;
      }

      .hero-brand {
        font-size: 18px;
      }

      .hero-signup,
      .hero-signin {
        font-size: 10px;
        padding: 7px 8px;
      }

      .hero-stage {
        min-height: 100vh;
      }

      .headphone-shell spline-viewer {
        height: 100%;
      }

      .moving-con {
        gap: 16px;
      }

      .moving-con h2 {
        font-size: clamp(26px, 11vw, 48px);
      }
    }
  </style>
</head>
<body>
  <div class="top-ribbon">
    <header class="hero-nav">
      <a class="hero-brand" href="/landing">Shopy</a>

      <nav class="hero-links" aria-label="Primary">
        <a href="#home">Home</a>
        <a href="#product-showcase">Product</a>
      </nav>

      <div class="hero-actions">
        <a class="hero-signup" href="/login?tab=register">Register</a>
        <a class="hero-signin" href="/login?tab=login">Login</a>
      </div>
    </header>
  </div>

  <main class="landing-flow">
    <section class="hero-stage" id="home" aria-label="Spline hero">
      <div class="hero-content">
        <div class="headphone-scene">
          <div id="headphoneShell" class="headphone-shell">
            
<spline-viewer url="https://prod.spline.design/uBsy5Mi9HMZ6pGfX/scene.splinecode"></spline-viewer>
        </div>
      </div>
    </section>

    <section class="moving-text" id="product-showcase" aria-hidden="true">
      <div class="moving-track">
        <div class="moving-con">
          <h2>Minimal</h2>
          <div class="gola"></div>
          <h2>Matte</h2>
          <div class="gola"></div>
          <h2>Mastered</h2>
          <div class="gola"></div>
        </div>
        <div class="moving-con">
          <h2>Minimal.</h2>
          <div class="gola"></div>
          <h2>Matte.</h2>
          <div class="gola"></div>
          <h2>Mastered.</h2>
          <div class="gola"></div>
        </div>
        <div class="moving-con">
          <h2>Minimal.</h2>
          <div class="gola"></div>
          <h2>Matte.</h2>
          <div class="gola"></div>
          <h2>Mastered.</h2>
          <div class="gola"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const shell = document.getElementById('headphoneShell');
      if (!shell) return;

      let currentY = 0;
      let currentRotate = 0;
      let currentScale = 1;

      let targetY = 0;
      let targetRotate = 0;
      let targetScale = 1;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      function updateTargets() {
        const scrollTop = window.scrollY || window.pageYOffset || 0;
        const viewport = window.innerHeight || 1;

        const progress = clamp(scrollTop / (viewport * 1.2), 0, 1);
        const rise = progress * 220;

        targetY = -rise;
        targetRotate = progress * 14;
        targetScale = 1 - progress * 0.07;
      }

      function animate() {
        currentY += (targetY - currentY) * 0.1;
        currentRotate += (targetRotate - currentRotate) * 0.1;
        currentScale += (targetScale - currentScale) * 0.1;

        shell.style.transform =
          `translate3d(0, ${currentY.toFixed(2)}px, 0) rotate(${currentRotate.toFixed(2)}deg) scale(${currentScale.toFixed(4)})`;

        requestAnimationFrame(animate);
      }

      window.addEventListener('scroll', updateTargets, { passive: true });
      window.addEventListener('resize', updateTargets);

      updateTargets();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
