<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant - Shopy Retailer</title>
  <link rel="icon" type="image/png" href="/static/Images/chit_chat.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="user-role" content="retailer">
  <style>
    :root{--charcoal:#1A1C23;--muted:#8E9BAE;--sand:#F8F7F4;--ivory:#F8F7F4;--accent:#1A1C23;--retailer:#1A1C23;--bg:#F8F7F4;}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;}
    html,body{height:100%;overflow:hidden;}
    body{display:flex;height:100vh;background:var(--bg);color:var(--charcoal);}

    @keyframes fadeUp{from{transform:translateY(12px);}to{transform:translateY(0);}}
    @keyframes msgIn{from{opacity:0.86;transform:translateY(8px) scale(0.992);}to{opacity:1;transform:translateY(0) scale(1);}}

    .sidebar{width:240px;background:var(--charcoal);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100;}
    .sidebar-brand{padding:28px 24px 22px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .brand-name{font-size:20px;font-weight:800;color:#fff;letter-spacing:0.5px;}
    .brand-sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.35);margin-top:3px;}
    .sidebar-nav{flex:1;padding:16px 12px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;margin-bottom:4px;text-decoration:none;color:rgba(255,255,255,0.6);font-size:14px;font-weight:600;transition:background-color 0.25s ease,color 0.25s ease,transform 0.25s ease;}
    .nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;transform:translateX(3px);}
    .nav-item.active{background:rgba(255,255,255,0.10);color:#fff;}
    .nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0;}
    .nav-item.active .nav-dot{background:#fff;}
    .sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.08);}
    .user-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;}
    .user-name{font-size:13px;font-weight:700;color:#fff;}
    .logout-btn{display:flex;align-items:center;padding:10px 14px;border-radius:12px;text-decoration:none;color:rgba(255,255,255,0.45);font-size:13px;font-weight:600;transition:0.2s;}
    .logout-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}

    .main{margin-left:240px;flex:1;padding:24px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .assistant-shell{background:#fff;border:1px solid rgba(248,247,244,0.4);border-radius:24px;display:flex;flex-direction:column;height:100%;overflow:hidden;box-shadow:0 18px 44px rgba(0,0,0,0.06);animation:fadeUp 0.45s ease 0.08s both;}

    .assistant-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:linear-gradient(135deg,#1A1C23 0%,#2D3148 100%);color:#fff;gap:12px;}
    .assistant-title{font-size:18px;font-weight:800;}
    .assistant-tools{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid rgba(248,247,244,0.4);background:#fff;overflow-x:auto;scrollbar-width:thin;scroll-snap-type:x proximity;}
    .assistant-tools::-webkit-scrollbar{height:6px;}
    .assistant-tools::-webkit-scrollbar-thumb{background:#F8F7F4;border-radius:999px;}
    .tool-btn{white-space:nowrap;border:1px solid #EAEBE6;background:#F9FAFB;color:#1A1C23;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;transition:transform 0.2s ease,background-color 0.2s ease,color 0.2s ease,border-color 0.2s ease;scroll-snap-align:start;}
    .tool-btn:hover{background:#1A1C23;color:#fff;border-color:#1A1C23;transform:translateY(-1px);}

    .assistant-chat{flex:1;display:flex;flex-direction:column;min-height:0;}

    .chat-messages{flex:1;overflow-y:auto;padding:18px;background:#F8F7F4;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
    .chat-messages::-webkit-scrollbar{width:6px;}
    .chat-messages::-webkit-scrollbar-thumb{background:#F8F7F4;border-radius:999px;}
    .chat-day{align-self:center;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:#8E9BAE;padding:6px 10px;border-radius:999px;background:rgba(248,247,244,0.35);}

    .msg{max-width:86%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;animation:msgIn 0.22s ease both;}
    .msg.bot{align-self:flex-start;background:#fff;border:1px solid rgba(248,247,244,0.6);color:#1A1C23;border-radius:4px 16px 16px 16px;}
    .msg.user{align-self:flex-end;background:#1A1C23;color:#fff;border-radius:16px 4px 16px 16px;}
    .msg ul{padding-left:16px;margin-top:5px;}
    .msg li{margin-bottom:3px;}
    .msg-section + .msg-section{margin-top:10px;padding-top:10px;border-top:1px solid #EAEBE6;}
    .msg-section-title{font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:#8E9BAE;}
    .msg-section-body{margin-top:6px;font-size:12px;line-height:1.5;color:#1A1C23;}
    .msg-section-pre{background:#F8F7F4;border:1px solid #EAEBE6;border-radius:10px;padding:8px 10px;white-space:pre-wrap;word-break:break-word;max-height:170px;overflow:auto;}

    .typing{display:flex;align-items:center;gap:5px;padding:4px 2px;}
    .typing span{width:7px;height:7px;border-radius:50%;background:#1A1C23;display:inline-block;animation:sageDot 1.2s infinite ease-in-out;}
    .typing span:nth-child(2){animation-delay:0.2s;}
    .typing span:nth-child(3){animation-delay:0.4s;}
    @keyframes sageDot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1.1);opacity:1;}}

    .chat-input-wrap{padding:12px;background:#fff;border-top:1px solid rgba(248,247,244,0.4);display:flex;gap:8px;}
    #assistant-input{flex:1;padding:11px 14px;border-radius:13px;border:1.5px solid #EAEBE6;background:#F9FAFB;font-size:13px;outline:none;transition:0.2s;}
    #assistant-input:focus{border-color:#F8F7F4;background:#fff;}
    #assistant-send{width:40px;height:40px;border:none;border-radius:11px;background:#1A1C23;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;}
    #assistant-send:hover{background:#11131a;}

    @media(max-width:768px){
      .sidebar{width:60px;}
      .brand-name,.brand-sub,.nav-item span,.user-name{display:none;}
      .main{margin-left:60px;padding:12px 10px;}
      .assistant-shell{border-radius:18px;}
      .assistant-header{padding:14px 14px;}
      .assistant-title{font-size:16px;}
      .assistant-tools{padding:8px 10px;gap:6px;}
      .tool-btn{padding:7px 10px;font-size:11px;}
      .chat-messages{padding:12px;}
      .chat-input-wrap{padding:10px;}
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none !important;transition:none !important;}
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-name">Shopy</div>
    <div class="brand-sub">Retailer Portal</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="/retailer/dashboard"><div class="nav-dot"></div><span>Dashboard</span></a>
    <a class="nav-item" href="/retailer/products"><div class="nav-dot"></div><span>Products</span></a>
    <a class="nav-item" href="/retailer/orders"><div class="nav-dot"></div><span>Orders</span></a>
    <a class="nav-item active" href="/retailer/assistant"><div class="nav-dot"></div><span>Assistant</span></a>
    <a class="nav-item" href="/profile"><div class="nav-dot"></div><span>Profile</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar">{{ username[0].upper() if username else 'R' }}</div>
      <div><div class="user-name">{{ username }}</div></div>
    </div>
    <a class="logout-btn" href="/logout">Logout</a>
  </div>
</aside>

<main class="main">
  <section class="assistant-shell">
    <div class="assistant-header">
      <div>
        <div class="assistant-title">Sage</div>
      </div>
    </div>

    <div class="assistant-tools">
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Give me a full health check of my store performance right now.')">Health Check</button>
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Which products are low stock and what should I restock first?')">Low Stock Plan</button>
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Show top products and explain why they are winning.')">Top Products</button>
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Analyze pending and delayed order risk and suggest actions.')">Order Risk</button>
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Give me a 7 day growth plan with 3 highest impact actions.')">7 Day Growth</button>
      <button type="button" class="tool-btn" onclick="askRetailerPreset('Find weak products and suggest pricing or listing improvements.')">Fix Weak Products</button>
    </div>

    <div class="assistant-chat" id="assistant-chat-view">
      <div class="chat-messages" id="assistant-msgs"></div>
      <div class="chat-input-wrap">
        <input id="assistant-input" type="text" placeholder="Ask Sage about your store..." autocomplete="off"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendRetailerMessage();}">
        <button id="assistant-send" onclick="sendRetailerMessage()" title="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </section>
</main>

<script>
(function () {
  const msgs = document.getElementById('assistant-msgs');
  const input = document.getElementById('assistant-input');
  let historyLoaded = false;

  function escapeHtml(text) {
    return (text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderMarkdown(raw) {
    let html = escapeHtml(raw).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const lines = html.split('\n');
    let inList = false;
    const out = [];

    for (const line of lines) {
      const m = line.match(/^[-*]\s+(.+)/);
      if (m) {
        if (!inList) {
          out.push('<ul>');
          inList = true;
        }
        out.push('<li>' + m[1] + '</li>');
      } else {
        if (inList) {
          out.push('</ul>');
          inList = false;
        }
        out.push(line ? '<span>' + line + '</span>' : '<br>');
      }
    }
    if (inList) out.push('</ul>');
    return out.join('\n');
  }

  function toMultilineHtml(text) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  function renderStructuredReply(payload) {
    if (!payload || typeof payload !== 'object') {
      return renderMarkdown(String(payload || ''));
    }

    const queryRan = (payload.query_ran || payload.query || '').trim();
    const dbOutput = (payload.db_output || '').trim();
    const answer = (payload.reply || payload.answer || payload.error || '').trim();

    if (!queryRan && !dbOutput) {
      return renderMarkdown(answer || 'No response.');
    }

    return `
      <div class="msg-section">
        <div class="msg-section-title">Query Ran</div>
        <div class="msg-section-body msg-section-pre">${toMultilineHtml(queryRan || 'N/A')}</div>
      </div>
      <div class="msg-section">
        <div class="msg-section-title">Database Output</div>
        <div class="msg-section-body msg-section-pre">${toMultilineHtml(dbOutput || 'No database output available.')}</div>
      </div>
      <div class="msg-section">
        <div class="msg-section-title">Final Answer</div>
        <div class="msg-section-body">${renderMarkdown(answer || 'No response.')}</div>
      </div>
    `;
  }

  function appendMessage(content, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'user') {
      div.innerHTML = escapeHtml(content);
    } else if (content && typeof content === 'object') {
      div.innerHTML = renderStructuredReply(content);
    } else {
      div.innerHTML = renderMarkdown(content);
    }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function appendDayLabel(day) {
    const label = document.createElement('div');
    label.className = 'chat-day';
    label.textContent = day;
    msgs.appendChild(label);
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function showWelcome() {
    appendMessage("Hello! I'm Sage, your retailer assistant. Ask me about sales, stock alerts, top products, or order trends.", 'bot');
  }

  window.sendRetailerMessage = async function () {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    appendMessage(text, 'user');
    const typing = appendTyping();

    try {
      const res = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typing.remove();
      appendMessage({
        query_ran: data.query_ran,
        db_output: data.db_output,
        answer: data.reply || data.error || 'No response.'
      }, 'bot');
      historyLoaded = true;
    } catch (err) {
      typing.remove();
      appendMessage('Connection error. Please try again.', 'bot');
    }
  };

  window.askRetailerPreset = function (prompt) {
    input.value = prompt;
    input.focus();
    window.sendRetailerMessage();
  };

  async function loadRetailerHistoryIntoChat() {
    if (historyLoaded) return;

    try {
      const res = await fetch('/api/ai/history');
      const data = await res.json();
      const history = data.history || [];

      if (!history.length) {
        showWelcome();
        historyLoaded = true;
        return;
      }

      let lastDay = '';
      history.forEach((item) => {
        const day = (item.created_at || '').split(' ').slice(0, 2).join(' ');
        if (day !== lastDay) {
          appendDayLabel(day);
          lastDay = day;
        }
        appendMessage(item.message || '', item.sender === 'user' ? 'user' : 'bot');
      });

      msgs.scrollTop = msgs.scrollHeight;
      historyLoaded = true;
    } catch (err) {
      showWelcome();
      historyLoaded = true;
    }
  }

  loadRetailerHistoryIntoChat();
  setTimeout(() => input.focus(), 120);
})();
</script>
</body>
</html>
